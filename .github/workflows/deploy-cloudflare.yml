name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy kasmi + kasmi-realtime
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      # Deploy the realtime Durable Object worker first so the main worker's
      # DO namespace binding can resolve. Safe to re-run on every push — Wrangler
      # treats it as an upsert (and migrations are tagged + idempotent).
      - name: Deploy kasmi-realtime (Durable Object)
        run: npx wrangler deploy --config workers/realtime/wrangler.toml

      - name: Build Next.js app for Workers
        run: npx opennextjs-cloudflare build
        env:
          # Public envs baked into the client bundle.
          NEXT_PUBLIC_REALTIME_URL: ${{ vars.NEXT_PUBLIC_REALTIME_URL }}
          # Server envs used at build time (migrations, etc.).
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy kasmi (Next.js)
        run: npx wrangler deploy

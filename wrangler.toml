#:schema node_modules/wrangler/config-schema.json

# Main application worker — serves the Next.js app via @opennextjs/cloudflare.
# The DO namespace binding points at the `kasmi-realtime` worker defined in
# workers/realtime/wrangler.toml, which owns the TabunganBroadcaster class.

name = "kasmi"
main = ".open-next/worker.js"
compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]

# Static assets produced by OpenNext. The binding name `ASSETS` is expected
# by the generated worker.
[assets]
directory = ".open-next/assets"
binding = "ASSETS"
run_worker_first = false

# Durable Object binding — references the class exported by kasmi-realtime.
[[durable_objects.bindings]]
name = "REALTIME"
class_name = "TabunganBroadcaster"
script_name = "kasmi-realtime"

# Hyperdrive — warm Postgres connection pool that lives at the edge so
# every Worker request doesn't pay a fresh TCP+TLS+Supabase-auth round
# trip (~1-2s). Points at the direct Supabase host; Hyperdrive itself
# fans out to warm pools per region on Cloudflare's side.
# See src/libs/prisma.ts for how the binding is consumed.
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "d276fc755dbd403eb9d495f684be851f"
# Local dev fallback — Wrangler's platform proxy (used by
# `wrangler dev` and OpenNext's env discovery at deploy time) refuses
# to start without a fallback. Instead of pinning the password here,
# set `WRANGLER_HYPERDRIVE_LOCAL_CONNECTION_STRING_HYPERDRIVE` or the
# legacy `CLOUDFLARE_HYPERDRIVE_LOCAL_CONNECTION_STRING_HYPERDRIVE` in
# your shell (matching DATABASE_URL in .dev.vars).

# R2 / KV / etc. can be added later. Secrets (DATABASE_URL, REALTIME_SECRET,
# NEXTAUTH_SECRET, NEXT_PUBLIC_REALTIME_URL) are set via:
#   wrangler secret put DATABASE_URL
#   wrangler secret put REALTIME_SECRET
# or through the GitHub Actions workflow.

[vars]
# Non-secret runtime config goes here. (Populated at deploy time.)
